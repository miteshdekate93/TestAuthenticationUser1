version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: authdb
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "YourStrong@Passw0rd",
          "-Q",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api-v2
      dockerfile: Dockerfile
    container_name: authapi
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=AuthDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      Jwt__Key: "super-secret-jwt-signing-key-change-in-production-min-32-chars"
      Jwt__Issuer: "AuthApi"
      Jwt__Audience: "AuthApiUsers"
      Jwt__ExpiryMinutes: "15"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  client:
    build:
      context: ./Angular
      dockerfile: Dockerfile
    container_name: authclient
    ports:
      - "4200:80"
    depends_on:
      - api
    environment:
      API_URL: "http://localhost:5001"

volumes:
  sqldata:
